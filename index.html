<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamu Buku Lingkungan Sekolah</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: green;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #999;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
        button {
            padding: 5px 10px;
            margin: 2px;
        }
    </style>
</head>
<body>
    <h1>Tamu Buku Lingkungan Sekolah</h1>

    <h3>Tambah Tamu</h3>
    <form id="tamuForm">
        <label>Nama: <input type="text" id="nama" required></label><br><br>
        <label>Kelas: <input type="text" id="kelas" required></label><br><br>
        <label>Komentar: <input type="text" id="komentar" required></label><br><br>
        <button type="submit">Tambah Tamu</button>
    </form>

    <h3>Daftar Tamu</h3>
    <table id="tamuTable">
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kelas</th>
                <th>Komentar</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <!-- Data tamu akan muncul di sini -->
        </tbody>
    </table>

    <script>
        let tamuData = [];
        let editIndex = null;

        const form = document.getElementById('tamuForm');
        const tableBody = document.querySelector('#tamuTable tbody');

        function renderTable() {
            tableBody.innerHTML = '';
            tamuData.forEach((tamu, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${tamu.nama}</td>
                    <td>${tamu.kelas}</td>
                    <td>${tamu.komentar}</td>
                    <td>
                        <button onclick="editTamu(${index})">Edit</button>
                        <button onclick="deleteTamu(${index})">Hapus</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const nama = document.getElementById('nama').value;
            const kelas = document.getElementById('kelas').value;
            const komentar = document.getElementById('komentar').value;

            if (editIndex === null) {
                // Tambah data
                tamuData.push({ nama, kelas, komentar });
            } else {
                // Edit data
                tamuData[editIndex] = { nama, kelas, komentar };
                editIndex = null;
            }

            form.reset();
            renderTable();
        });

        function editTamu(index) {
            editIndex = index;
            const tamu = tamuData[index];
            document.getElementById('nama').value = tamu.nama;
            document.getElementById('kelas').value = tamu.kelas;
            document.getElementById('komentar').value = tamu.komentar;
        }

        function deleteTamu(index) {
            if (confirm('Apakah Anda yakin ingin menghapus tamu ini?')) {
                tamuData.splice(index, 1);
                renderTable();
            }
        }
    </script>
</body>
</html>
